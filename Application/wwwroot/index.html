<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EisAquiUmDev - Autenticação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 45%;
            height: 1px;
            background: #ddd;
            vertical-align: middle;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        .google-btn {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .google-btn:hover {
            background: #f5f5f5;
            border-color: #999;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: #999;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .profile {
            display: none;
            text-align: center;
        }

        .profile.show {
            display: block;
        }

        .profile-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .profile-info p {
            margin: 10px 0;
            color: #666;
        }

        .profile-info strong {
            color: #333;
        }

        .logout-btn {
            background: #dc3545;
        }

        .logout-btn:hover {
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EisAquiUmDev</h1>

        <!-- �rea de Autentica��o -->
        <div id="authArea">
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('login')">Login</button>
                <button class="tab-button" onclick="switchTab('register')">Registrar</button>
            </div>

            <!-- Tab Login -->
            <div id="login" class="tab-content active">
                <div id="loginAlert"></div>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" placeholder="Enter a password" required>
                    </div>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>

                <div class="divider">ou</div>

                <button class="btn-primary google-btn" onclick="signInWithGoogle()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
            </div>

            <!-- Tab Register -->
            <div id="register" class="tab-content">
                <div id="registerAlert"></div>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Nome</label>
                        <input type="text" id="registerName" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Senha</label>
                        <input type="password" id="registerPassword" placeholder="��������" required>
                    </div>
                    <button type="submit" class="btn-primary">Criar Conta</button>
                </form>

                <div class="divider">ou</div>

                <button class="btn-primary google-btn" onclick="signInWithGoogle()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
            </div>
        </div>

        <!-- �rea de Perfil -->
        <div id="profileArea" class="profile">
            <h2>Bem-vindo! ??</h2>
            <div class="profile-info">
                <p><strong>Nome:</strong> <span id="profileName"></span></p>
                <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                <p><strong>ID:</strong> <span id="profileId"></span></p>
            </div>
            <button class="btn-primary logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <!-- Google Sign-In Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const API_URL = 'https://localhost:7235/api';

        // Verificar se est� autenticado ao carregar
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                loadProfile();
            } else {
                showAuthArea();
            }
        });

        // Inicializar Google Sign-In
        function initGoogleSignIn() {
            google.accounts.id.initialize({
                client_id: '51993202531-q0541gq40uaib12fimt5srqmn9fr48q1.apps.googleusercontent.com',
                callback: handleGoogleLogin
            });
        }

        // Callback do Google Sign-In
        function handleGoogleLogin(response) {
            if (response.credential) {
                loginWithGoogle(response.credential);
            }
        }

        // Fazer login com Google
        async function signInWithGoogle() {
            google.accounts.id.renderButton(
                document.createElement('div'),
                { theme: 'outline', size: 'large' }
            );
            google.accounts.id.prompt();
        }

        // Enviar token do Google para o backend
        async function loginWithGoogle(idToken) {
            try {
                const response = await fetch(`${API_URL}/auth/google-login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ idToken })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('loginAlert', 'Autentica��o bem-sucedida! ??', 'success');
                    setTimeout(() => loadProfile(), 1500);
                } else {
                    showAlert('loginAlert', data.message || 'Erro ao autenticar', 'error');
                }
            } catch (error) {
                showAlert('loginAlert', 'Erro na comunicação com o servidor', 'error');
                console.error(error);
            }
        }

        // Fazer login com email/senha
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('loginAlert', 'Login bem-sucedido! ??', 'success');
                    setTimeout(() => loadProfile(), 1500);
                } else {
                    showAlert('loginAlert', data || 'Erro ao fazer login', 'error');
                }
            } catch (error) {
                showAlert('loginAlert', 'Erro na comunica��o com o servidor', 'error');
                console.error(error);
            }
        }

        // Registrar novo usu�rio
        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            if (password.length < 6) {
                showAlert('registerAlert', 'Senha deve ter no m�nimo 6 caracteres', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password, name })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('registerAlert', 'Conta criada com sucesso! ??', 'success');
                    setTimeout(() => loadProfile(), 1500);
                } else {
                    showAlert('registerAlert', data || 'Erro ao criar conta', 'error');
                }
            } catch (error) {
                showAlert('registerAlert', 'Erro na comunica��o com o servidor', 'error');
                console.error(error);
            }
        }

        // Carregar perfil do usu�rio
        async function loadProfile() {
            try {
                const token = localStorage.getItem('token');
                const user = localStorage.getItem('user');

                if (!token || !user) {
                    showAuthArea();
                    return;
                }

                const userData = JSON.parse(user);
                document.getElementById('profileName').textContent = userData.name;
                document.getElementById('profileEmail').textContent = userData.email;
                document.getElementById('profileId').textContent = userData.id;

                hideAuthArea();
                showProfileArea();
            } catch (error) {
                console.error('Erro ao carregar perfil:', error);
                logout();
            }
        }

        // Fazer logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerName').value = '';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            showAuthArea();
            hideProfileArea();
        }

        // Fun��es auxiliares
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function showAlert(elementId, message, type) {
            const alertDiv = document.getElementById(elementId);
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 5000);
        }

        function showAuthArea() {
            document.getElementById('authArea').style.display = 'block';
        }

        function hideAuthArea() {
            document.getElementById('authArea').style.display = 'none';
        }

        function showProfileArea() {
            document.getElementById('profileArea').classList.add('show');
        }

        function hideProfileArea() {
            document.getElementById('profileArea').classList.remove('show');
        }

        // Inicializar Google Sign-In quando carregar
        initGoogleSignIn();
    </script>
</body>
</html>
